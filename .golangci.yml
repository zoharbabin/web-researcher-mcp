version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
      - text: "Error return value of .*.Close"
        linters:
          - errcheck
      - text: "QF1003|QF1012"
        linters:
          - staticcheck
