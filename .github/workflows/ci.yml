name: ⚙️ CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_python_live:
        description: "Run Python SDK live E2E tests (requires internet, builds Go binary)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

jobs:
  # ── 🔍 Change detector ────────────────────────────────────────────────────────
  # Classifies each push/PR as "code change" (full CI) or "harmless"
  # (docs/assets/packaging only → skip heavy Go jobs so those PRs go green fast).
  # Allowlist: ALL changed files must match to skip. One unrecognised file
  # (.go, Dockerfile, Makefile, workflow, lenses/) triggers code=true.
  # A skipped *required* check reports "skipped" — branch protection counts it as
  # passing, so docs PRs are never stuck on checks that have nothing to run.
  changes:
    name: 🔍 Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      packaging: ${{ steps.filter.outputs.packaging }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          # PR: diff against the base SHA. Push: diff against the previous SHA.
          base="${PR_BASE:-$PUSH_BEFORE}"
          # Fallback for first push / unknown base: run full CI.
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "No usable diff base; running full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "packaging=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(git diff --name-only "$base" HEAD)
          echo "Changed files:"; echo "$files"
          # A file is "harmless" if it matches the allowlist; if ANY changed
          # file is not harmless, run full CI (code=true).
          # A PR is "packaging-only" if every changed file is under packaging/.
          code=false
          packaging=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              packaging/*) : ;;            # packaging — keep checking both flags
              *.md|docs/*|decks/*|assets/*|LICENSE|.gitignore|mkdocs.yml|overrides/*|.github/*_TEMPLATE*|.github/ISSUE_TEMPLATE/*)
                packaging=false ;;         # harmless but not packaging-only
              *)
                code=true; packaging=false; break ;;  # anything else → full CI
            esac
          done <<< "$files"
          # Edge case: empty diff (e.g. workflow_dispatch with no changes)
          # is not a packaging-only PR.
          [ -z "$files" ] && packaging=false
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "packaging=$packaging" >> "$GITHUB_OUTPUT"
          echo "Decision: code=$code packaging=$packaging"

  # ── Always-run gates (every PR, even docs-only) ───────────────────────────────
  # These never skip. They catch cross-cutting drift that a change detector can't
  # safely filter: docs/code drift, Python client drift, packaging consistency.

  # 🧹 Lint — fast formatting + static analysis gate. Gates test and security.
  lint:
    name: 🧹 Lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Check formatting (gofmt -s)
        run: |
          unformatted=$(gofmt -s -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean (run 'make fmt'):"
            echo "$unformatted"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          args: --timeout=5m

  # 📄 Docs drift — docs/TOOLS.md ↔ registry drift. Runs on every PR except
  # packaging-only ones: a machine-generated packaging bump cannot cause
  # docs/registry drift, so skipping saves ~2 min on every release cycle.
  docs-drift:
    name: 📄 Docs ↔ Registry Drift
    needs: changes
    if: needs.changes.outputs.packaging != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true
      - name: Verify tool docs/annotations match the registry
        run: |
          go test -count=1 \
            -run 'TestToolsDocMatchesRegistry|TestOutputSchemaMatchesResponse|TestToolDescriptionQuality|TestAllToolsHaveAnnotations|TestAllToolsRegistered|TestAllToolsHaveOutputSchema|TestExternalContentToolsCarryTrustMarker' \
            ./internal/tools/...

  # 🐍 Python client drift — regenerated client must match live Go schemas.
  # Runs on every PR except packaging-only ones: a packaging bump cannot change
  # Go tool schemas.
  python-drift:
    name: 🐍 Python Client Drift
    needs: changes
    if: needs.changes.outputs.packaging != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Verify Python client matches Go schemas
        run: make check-python-drift

  # 🧪 Python SDK tests — unit + integration tests (mock HTTP, no binary needed).
  # Skipped on packaging-only PRs — a packaging bump cannot break the Python SDK.
  test-python:
    name: 🧪 Test · Python SDK
    needs: changes
    if: needs.changes.outputs.packaging != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python3 -m pip install --upgrade pytest
      - name: Run Python SDK tests
        run: python3 -m pytest tests/python/ --ignore=tests/python/test_live_e2e.py -v

  # 📦 Packaging validation — PKGBUILD / .SRCINFO / flake.nix version + hash
  # consistency. Catches drift before it ships in a release.
  validate-packaging:
    name: 📦 Validate Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate PKGBUILD syntax and required fields
        run: |
          bash -n packaging/aur/PKGBUILD
          for field in pkgname pkgver pkgrel arch url license; do
            grep -q "^${field}=" packaging/aur/PKGBUILD || \
              { echo "::error::PKGBUILD missing required field: ${field}"; exit 1; }
          done
          echo "PKGBUILD syntax OK"

      - name: Validate version consistency across packaging files
        run: |
          set -euo pipefail
          PKGBUILD_VER="$(grep '^pkgver=' packaging/aur/PKGBUILD | cut -d= -f2)"
          SRCINFO_VER="$(grep 'pkgver = ' packaging/aur/.SRCINFO | awk '{print $3}' | head -1)"
          FLAKE_VER="$(grep 'version = "' packaging/nix/flake.nix | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"

          echo "PKGBUILD: ${PKGBUILD_VER}"
          echo ".SRCINFO: ${SRCINFO_VER}"
          echo "flake.nix: ${FLAKE_VER}"

          if [ "$PKGBUILD_VER" != "$SRCINFO_VER" ]; then
            echo "::error::Version mismatch: PKGBUILD=${PKGBUILD_VER} vs .SRCINFO=${SRCINFO_VER}"
            exit 1
          fi
          if [ "$PKGBUILD_VER" != "$FLAKE_VER" ]; then
            echo "::error::Version mismatch: PKGBUILD=${PKGBUILD_VER} vs flake.nix=${FLAKE_VER}"
            exit 1
          fi
          echo "All packaging versions consistent: ${PKGBUILD_VER}"

      - name: Validate SHA256 format in .SRCINFO
        run: |
          set -euo pipefail
          while IFS= read -r line; do
            if echo "$line" | grep -qE 'sha256sums_(x86_64|aarch64) = '; then
              hash="$(echo "$line" | awk '{print $3}')"
              if ! echo "$hash" | grep -qE '^[0-9a-f]{64}$'; then
                echo "::error::Invalid SHA256 in .SRCINFO: ${hash}"
                exit 1
              fi
            fi
          done < packaging/aur/.SRCINFO
          echo ".SRCINFO SHA256 format OK"

      - name: Validate Nix SRI hash format in flake.nix
        run: |
          set -euo pipefail
          count=0
          while IFS= read -r line; do
            if echo "$line" | grep -qE '^\s+hash = "sha256-'; then
              count=$((count + 1))
              hash="$(echo "$line" | grep -oE 'sha256-[A-Za-z0-9+/=]+')"
              if [ -z "$hash" ]; then
                echo "::error::Malformed SRI hash line: ${line}"
                exit 1
              fi
            fi
          done < packaging/nix/flake.nix
          if [ "$count" -lt 4 ]; then
            echo "::error::Expected 4 platform hashes in flake.nix, found ${count}"
            exit 1
          fi
          echo "flake.nix SRI hashes OK (${count} platforms)"

  # ── Code-only jobs (skipped on docs/packaging/assets PRs) ────────────────────

  # 🧪 Go tests — unit + integration with race detector.
  # Waits for lint so a formatting failure doesn't waste test compute.
  test:
    name: 🧪 Test · Go ${{ matrix.go-version }}
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25.11"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Run tests with race detector and coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic -count=1 ./...

      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.25.11'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: matrix.go-version == '1.25.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  # Gate job: always reports under the exact name required by branch protection.
  # When code=true the matrix job ran; when code=false it was skipped (docs PR).
  # Either way this job passes so auto-merge isn't stuck.
  test-gate:
    name: 🧪 Test · Go 1.25.11
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pass if tests succeeded or were not needed
        run: |
          result="${{ needs.test.result }}"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            echo "Tests: $result — gate passes."
          else
            echo "Tests: $result — gate fails."
            exit 1
          fi

  # 🔬 E2E — security + lifecycle tests (STDIO + HTTP + OAuth). Network-free:
  # tests assert on blocked schemes, private IPs, schema validation, session
  # crypto, secrets masking, and the OAuth/scope gate. Waits for unit tests
  # so a basic test failure doesn't spin up the E2E suite unnecessarily.
  e2e:
    name: 🔬 E2E · Security + Lifecycle
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      # The -run alternation MUST match the test name prefixes (TestHTTP_/TestOAuth_)
      # or they pass locally but never run here — a silent coverage gap.
      - name: Run E2E security + lifecycle suite (STDIO + HTTP + OAuth)
        run: go test -race -tags=e2e -count=1 -run 'TestSecurity_STDIO|TestMCPLifecycle|TestHTTP_|TestOAuth_' ./tests/e2e/...

  # 🐳 Docker smoke — builds the shipped image and drives MCP over HTTP
  # end-to-end (initialize + web_search). The regression guard for the
  # HTTP-lifecycle fix (container must not exit on stdin EOF). Waits for
  # unit tests so a test failure doesn't spin up a full Docker build.
  docker-smoke:
    name: 🐳 Docker Smoke Test
    needs: [changes, test]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and smoke-test HTTP transport
        run: make docker-smoke

  # 🏗️ Build — cross-compile for all platforms. Runs in parallel with test/lint
  # so cross-compilation failures surface quickly alongside other CI feedback.
  build:
    name: 🏗️ Build · ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXTENSION=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXTENSION=".exe"
          fi
          go build \
            -ldflags="-s -w -X main.version=${{ github.sha }}" \
            -o "web-researcher-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${EXTENSION}" \
            ./cmd/web-researcher-mcp

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: web-researcher-mcp-*
          retention-days: 7

  # 🛡️ Security scan — govulncheck + gosec. Waits for lint so a formatting
  # failure doesn't waste the AST scan. govulncheck and gosec are pinned as
  # go.mod tool directives (same versions as `make vuln` / `make sec` locally).
  security:
    name: 🛡️ Security Scan
    needs: [changes, lint]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      # govulncheck: known CVEs in module dependencies.
      - name: Run govulncheck
        run: go tool govulncheck ./...

      # gosec: injection, weak crypto, SSRF sinks, unsafe file ops.
      # G104 excluded (covered by golangci-lint errcheck); tests excluded.
      - name: Run gosec
        run: go tool gosec -exclude=G104 -exclude-dir=tests -quiet ./...

  # ── Manual-dispatch only ──────────────────────────────────────────────────────

  # 🐍 Python live E2E — hits real external APIs. Keyless providers
  # (DuckDuckGo, PubMed, World Bank, ClinicalTrials.gov) run unconditionally;
  # keyed providers self-skip when secrets are absent. NOT a required gate —
  # opt-in only via workflow_dispatch to avoid flaky failures on rate limits.
  # Waits for Python SDK tests and drift gate so we don't waste live API calls
  # on a broken SDK build.
  python-live-e2e:
    name: 🐍 Live E2E · Python SDK
    needs: [test-python, python-drift]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_python_live == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python3 -m pip install --upgrade pytest

      - name: Run Python SDK live E2E tests
        env:
          GOOGLE_CUSTOM_SEARCH_API_KEY: ${{ secrets.GOOGLE_CUSTOM_SEARCH_API_KEY }}
          GOOGLE_CUSTOM_SEARCH_ID: ${{ secrets.GOOGLE_CUSTOM_SEARCH_ID }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: make test-python-live
