name: 🔍 CodeQL Security Analysis

on:
  push:
    branches: [main]
    paths-ignore: &docs_paths
      - "**/*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - ".gitignore"
      - "mkdocs.yml"
      - "overrides/**"
      - ".github/**_TEMPLATE**"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches: [main]
    paths-ignore: *docs_paths
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ── 🔍 CodeQL ─────────────────────────────────────────────────────────────────
  # Runs GitHub's CodeQL engine with `security-extended,security-and-quality`
  # query suites. Results appear in Security → Code scanning. Findings must be
  # addressed or dismissed before they accumulate.
  analyze:
    name: 🔍 CodeQL · Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
