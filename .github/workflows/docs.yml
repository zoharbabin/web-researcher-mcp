name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "ARCHITECTURE.md"
      - "CONTRIBUTING.md"
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - run: pip install mkdocs-material

      - name: Assemble docs from source files
        run: |
          mkdir -p site_src
          # Copy and rewrite internal links to flattened structure
          for f in README.md ARCHITECTURE.md CONTRIBUTING.md; do
            # Rewrites are anchored to the Markdown link prefix `](` so that
            # only clickable links are flattened to the site's URL scheme.
            # Inline code-span repo paths (e.g. `docs/SECURITY.md`) are left
            # verbatim — they document on-disk paths, not site routes.
            sed -e 's|](docs/TOOLS.md|](tools.md|g' \
                -e 's|](docs/ERROR_HANDLING.md|](error-handling.md|g' \
                -e 's|](docs/SECURITY_AND_COMPLIANCE.md|](security-and-compliance.md|g' \
                -e 's|](docs/SECURITY.md|](security.md|g' \
                -e 's|](docs/DEPLOYMENT.md|](deployment.md|g' \
                -e 's|](docs/MIGRATION.md|](migration.md|g' \
                -e 's|](docs/EXAMPLES.md|](examples.md|g' \
                -e 's|](docs/API_SETUP.md|](api-setup.md|g' \
                -e 's|](docs/LESSONS_LEARNED.md|](lessons-learned.md|g' \
                -e 's|](docs/BRAND_GUIDELINES.md|](brand-guidelines.md|g' \
                -e 's|](docs/PRIVACY.md|](privacy.md|g' \
                -e 's|](docs/SESSION_PERSISTENCE.md|](session-persistence.md|g' \
                -e 's|](ARCHITECTURE.md|](architecture.md|g' \
                -e 's|](CONTRIBUTING.md|](contributing.md|g' \
                -e 's|](SECURITY.md)|](https://github.com/zoharbabin/web-researcher-mcp/blob/main/SECURITY.md)|g' \
                -e 's|](CODE_OF_CONDUCT.md|](https://github.com/zoharbabin/web-researcher-mcp/blob/main/CODE_OF_CONDUCT.md|g' \
                -e 's|](assets/|](https://raw.githubusercontent.com/zoharbabin/web-researcher-mcp/main/assets/|g' \
                -e 's|src="assets/|src="https://raw.githubusercontent.com/zoharbabin/web-researcher-mcp/main/assets/|g' \
                "$f" > "site_src/$(echo "$f" | tr '[:upper:]' '[:lower:]')"
          done
          mv site_src/readme.md site_src/index.md
          # Copy docs/ files with cross-link rewriting
          for f in docs/TOOLS.md docs/DEPLOYMENT.md docs/SECURITY.md docs/SECURITY_AND_COMPLIANCE.md docs/MIGRATION.md docs/EXAMPLES.md docs/API_SETUP.md docs/LESSONS_LEARNED.md docs/BRAND_GUIDELINES.md docs/PRIVACY.md docs/SESSION_PERSISTENCE.md docs/ERROR_HANDLING.md; do
            # Anchored to `](` for the same reason as the root loop above:
            # flatten only Markdown links, never inline code-span repo paths.
            # `](../SECURITY.md` and the root-policy link resolve to GitHub
            # because root SECURITY.md is not published to the site.
            sed -e 's|](ARCHITECTURE.md|](architecture.md|g' \
                -e 's|](CONTRIBUTING.md|](contributing.md|g' \
                -e 's|](ERROR_HANDLING.md|](error-handling.md|g' \
                -e 's|](SECURITY_AND_COMPLIANCE.md|](security-and-compliance.md|g' \
                -e 's|](../SECURITY.md)|](https://github.com/zoharbabin/web-researcher-mcp/blob/main/SECURITY.md)|g' \
                -e 's|](SECURITY.md|](security.md|g' \
                -e 's|](TOOLS.md|](tools.md|g' \
                -e 's|](DEPLOYMENT.md|](deployment.md|g' \
                -e 's|](MIGRATION.md|](migration.md|g' \
                -e 's|](EXAMPLES.md|](examples.md|g' \
                -e 's|](API_SETUP.md|](api-setup.md|g' \
                -e 's|](LESSONS_LEARNED.md|](lessons-learned.md|g' \
                -e 's|](BRAND_GUIDELINES.md|](brand-guidelines.md|g' \
                -e 's|](PRIVACY.md|](privacy.md|g' \
                -e 's|](SESSION_PERSISTENCE.md|](session-persistence.md|g' \
                "$f" > "site_src/$(basename "$f" | tr '[:upper:]' '[:lower:]')"
          done
          # Rename files with underscores to hyphens for clean URLs
          [ -f site_src/api_setup.md ] && mv site_src/api_setup.md site_src/api-setup.md
          [ -f site_src/lessons_learned.md ] && mv site_src/lessons_learned.md site_src/lessons-learned.md
          [ -f site_src/brand_guidelines.md ] && mv site_src/brand_guidelines.md site_src/brand-guidelines.md
          [ -f site_src/session_persistence.md ] && mv site_src/session_persistence.md site_src/session-persistence.md
          [ -f site_src/error_handling.md ] && mv site_src/error_handling.md site_src/error-handling.md
          [ -f site_src/security_and_compliance.md ] && mv site_src/security_and_compliance.md site_src/security-and-compliance.md

      - run: mkdocs gh-deploy --force
