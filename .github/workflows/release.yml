name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # macOS Developer ID signing + notarization (see .goreleaser.yml
          # notarize.macos). The notarize block self-gates on MACOS_SIGN_P12
          # being set, so until these secrets exist GoReleaser skips signing and
          # ships unsigned darwin binaries exactly as before.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      # ── Windows Authenticode signing via Azure Trusted/Artifact Signing ──────
      # Signs the GoReleaser-built .exe IN PLACE on this Linux runner using jsign
      # (no Windows job, no Wine — jsign calls the Azure REST endpoint directly),
      # then re-packages the zip and rewrites checksums so the published artifact
      # and checksums.txt cover the SIGNED binary. Gated on AZURE_SIGNING_ENABLED
      # so an unset/false flag ships unsigned exactly as before (zero regression).
      # Identity: CN=Zohar Babin (Azure individual validation). Certs are short-
      # lived (~3 days) and auto-rotate per sign; the RFC-3161 timestamp keeps the
      # signature valid after the cert expires. See docs/RELEASE_SIGNING.md.
      - name: Sign Windows binary (Azure Trusted Signing)
        if: ${{ vars.AZURE_SIGNING_ENABLED == 'true' }}
        id: sign-windows
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # Endpoint host for the signing account's region (East US). NO trailing
          # slash — jsign concatenates the API path directly, so a trailing slash
          # produces a double-slash URL and a 404 from the signing endpoint.
          SIGN_ENDPOINT: https://eus.codesigning.azure.net
          # jsign alias = "<account>/<certificate-profile>".
          SIGN_ALIAS: web-researcher-signing/web-researcher-public
        run: |
          set -euo pipefail
          WIN_EXE=$(find dist -name "web-researcher-mcp.exe" -path "*windows*" | head -1)
          if [ -z "$WIN_EXE" ]; then
            echo "::warning::Windows exe not found in dist/, skipping signing"
            exit 0
          fi

          # Toolchain: JRE for jsign + Azure CLI for the access token.
          sudo apt-get update -qq
          sudo apt-get install -y -qq default-jre-headless
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash >/dev/null
          fi

          JSIGN_VERSION="7.4"
          curl -fsSL -o /tmp/jsign.jar \
            "https://github.com/ebourg/jsign/releases/download/${JSIGN_VERSION}/jsign-${JSIGN_VERSION}.jar"

          # Service-principal login → token scoped to the code-signing resource.
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID" >/dev/null
          ACCESS_TOKEN=$(az account get-access-token \
            --resource https://codesigning.azure.net \
            --query accessToken -o tsv)

          # Sign in place. Timestamp via Microsoft RFC-3161 TSA so the signature
          # outlives the short-lived cert.
          java -jar /tmp/jsign.jar \
            --storetype TRUSTEDSIGNING \
            --keystore "$SIGN_ENDPOINT" \
            --storepass "$ACCESS_TOKEN" \
            --alias "$SIGN_ALIAS" \
            --tsmode RFC3161 \
            --tsaurl http://timestamp.acs.microsoft.com \
            "$WIN_EXE"

          echo "exe_path=$WIN_EXE" >> "$GITHUB_OUTPUT"
          echo "::notice::Windows binary signed via Azure Trusted Signing"

      - name: Repackage signed Windows zip + checksums
        if: ${{ vars.AZURE_SIGNING_ENABLED == 'true' && steps.sign-windows.outputs.exe_path != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED_EXE: ${{ steps.sign-windows.outputs.exe_path }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="web-researcher-mcp_${VERSION}_windows_amd64.zip"
          ZIP_PATH="dist/$ZIP_NAME"

          if [ ! -f "$ZIP_PATH" ]; then
            echo "::warning::$ZIP_PATH not found; release retains its archived exe"
            exit 0
          fi

          # Swap the signed exe into the release zip (the exe is stored flat in the
          # archive, hence -j), then re-upload and rewrite its checksum entry.
          cp "$SIGNED_EXE" /tmp/web-researcher-mcp.exe
          ( cd /tmp && zip -j "$OLDPWD/$ZIP_PATH" web-researcher-mcp.exe )

          gh release upload "${{ github.ref_name }}" "$ZIP_PATH" --clobber

          sha256sum "$ZIP_PATH" | sed "s|dist/||" > /tmp/new_checksum.txt
          if [ -f dist/checksums.txt ]; then
            grep -v "$ZIP_NAME" dist/checksums.txt > /tmp/remaining.txt || true
            cat /tmp/remaining.txt /tmp/new_checksum.txt > dist/checksums.txt
            gh release upload "${{ github.ref_name }}" dist/checksums.txt --clobber
          fi
          echo "::notice::Signed Windows zip and checksums.txt updated"

      - name: Build .mcpb bundles
        run: |
          sudo apt-get install -y jq zip
          bash scripts/build-mcpb.sh "${{ github.ref_name }}"

      - name: Upload .mcpb bundles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in dist/mcpb/*.mcpb; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-web-researcher-mcp.spdx.json
          output-file: sbom-web-researcher-mcp.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} sbom-web-researcher-mcp.spdx.json --clobber

      - name: Sign release artifacts with cosign
        run: |
          for asset in dist/checksums.txt; do
            if [ -f "$asset" ]; then
              cosign sign-blob --yes "$asset" --output-signature "${asset}.sig" --output-certificate "${asset}.pem"
              gh release upload ${{ github.ref_name }} "${asset}.sig" "${asset}.pem" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-sign:
    name: Sign Docker Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign GHCR image
        run: |
          IMAGE="ghcr.io/zoharbabin/web-researcher-mcp:${GITHUB_REF_NAME#v}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest}}' | jq -r '.digest')
          cosign sign --yes "ghcr.io/zoharbabin/web-researcher-mcp@${DIGEST}"

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: docker-sign
    steps:
      - uses: actions/checkout@v6

      - name: Sync version references for publish
        run: |
          echo "${GITHUB_REF_NAME#v}" > VERSION
          bash scripts/sync-version.sh

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz
          chmod +x mcp-publisher

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish || echo "MCP Registry publish failed (may already exist)"

  publish-smithery:
    name: Publish to Smithery
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.SMITHERY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Smithery CLI
        run: npm install -g @smithery/cli

      - name: Build .mcpb bundle
        run: |
          sudo apt-get install -y jq zip
          bash scripts/build-mcpb.sh "${GITHUB_REF_NAME}"

      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "$HOME/.config/smithery"
          echo "{\"apiKey\":\"${SMITHERY_API_KEY}\"}" > "$HOME/.config/smithery/settings.json"
          smithery mcp publish "dist/mcpb/web-researcher-mcp_${VERSION}_linux_amd64.mcpb" \
            -n web-researcher-mcp/web-researcher-mcp || echo "Smithery publish failed (non-fatal)"

