name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Build .mcpb bundles
        run: |
          sudo apt-get install -y jq zip
          bash scripts/build-mcpb.sh "${{ github.ref_name }}"

      - name: Upload .mcpb bundles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in dist/mcpb/*.mcpb; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-web-researcher-mcp.spdx.json
          output-file: sbom-web-researcher-mcp.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} sbom-web-researcher-mcp.spdx.json --clobber

      - name: Sign release artifacts with cosign
        run: |
          for asset in dist/checksums.txt; do
            if [ -f "$asset" ]; then
              cosign sign-blob --yes "$asset" --output-signature "${asset}.sig" --output-certificate "${asset}.pem"
              gh release upload ${{ github.ref_name }} "${asset}.sig" "${asset}.pem" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-sign:
    name: Sign Docker Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign GHCR image
        run: |
          IMAGE="ghcr.io/zoharbabin/web-researcher-mcp:${GITHUB_REF_NAME#v}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest}}' | jq -r '.digest')
          cosign sign --yes "ghcr.io/zoharbabin/web-researcher-mcp@${DIGEST}"

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: docker-sign
    steps:
      - uses: actions/checkout@v6

      - name: Update server.json with release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
             --arg ghcr "ghcr.io/zoharbabin/web-researcher-mcp:$VERSION" \
             --arg dh "docker.io/zoharbabin/web-researcher-mcp:$VERSION" \
             '.version = $v | .packages[0].identifier = $ghcr | .packages[1].identifier = $dh' \
             server.json > server.json.tmp && mv server.json.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz
          chmod +x mcp-publisher

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  publish-smithery:
    name: Publish to Smithery
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.SMITHERY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Smithery CLI
        run: npm install -g @smithery/cli

      - name: Build .mcpb bundle
        run: |
          sudo apt-get install -y jq zip
          bash scripts/build-mcpb.sh "${GITHUB_REF_NAME}"

      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "$HOME/.config/smithery"
          echo "{\"apiKey\":\"${SMITHERY_API_KEY}\"}" > "$HOME/.config/smithery/settings.json"
          smithery mcp publish "dist/mcpb/web-researcher-mcp_${VERSION}_linux_amd64.mcpb" \
            -n web-researcher-mcp/web-researcher-mcp || echo "Smithery publish failed (non-fatal)"

  update-versions:
    name: Update Version References
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update all version-bearing files
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # server.json
          jq --arg v "$VERSION" \
             --arg ghcr "ghcr.io/zoharbabin/web-researcher-mcp:$VERSION" \
             --arg dh "docker.io/zoharbabin/web-researcher-mcp:$VERSION" \
             '.version = $v | .packages[0].identifier = $ghcr | .packages[1].identifier = $dh' \
             server.json > server.json.tmp && mv server.json.tmp server.json

          # .claude-plugin/plugin.json
          jq --arg v "$VERSION" '.version = $v' \
             .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp \
             && mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: bump version references to ${GITHUB_REF_NAME#v} [skip ci]"
            git push origin main
          fi
