name: 🚀 Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.37.5) — use only when the push trigger misfired"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read

jobs:
  # ── 🏗️ Core release ──────────────────────────────────────────────────────────
  # Runs GoReleaser: cross-compiles, signs, notarizes, pushes Docker images,
  # updates package-manager taps/manifests, publishes the GitHub Release, then
  # attaches the SBOM, cosign signature, and .mcpb bundles.
  #
  # Fast-fail order (cheapest checks first):
  #   Python drift → macOS chain → Choco CLI → Docker logins → GoReleaser → post-steps
  release:
    name: 🏗️ GoReleaser · Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag ref (override for manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: echo "GITHUB_REF_NAME=${{ inputs.tag }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      # ── Fast-fail gates (before any slow or authenticated steps) ──────────────

      # Verify the Python client was regenerated after the last schema change.
      # The PR-based python-drift CI job is the primary gate; this is the final
      # backstop for a tag pushed directly off main (bypassing a PR).
      - name: Set up Python (for drift check)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify Python client is up-to-date
        run: make check-python-drift

      # Guard against the #204 regression: AMFI SIGKILLs a darwin binary whose
      # Developer ID signature carries an UNSATISFIABLE designated requirement,
      # which happens when the signing p12 lacks the full Apple chain (leaf-only
      # → quill emits `certificate root[...]` instead of `certificate 1[...]`).
      # The release runs on Linux (no codesign), so we verify the p12 STRUCTURE
      # here with openssl and fail fast if the intermediate ("Developer ID
      # Certification Authority") or the Apple Root CA is missing — before
      # GoReleaser signs+notarizes+publishes a binary that would die on launch.
      # Self-gates on MACOS_SIGN_P12 (no-op for runs without the cert).
      - name: Verify macOS signing chain (fail fast on #204 regression)
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
        run: |
          set -euo pipefail
          # Self-gate: no cert configured → skip cleanly (unsigned darwin build, as before).
          if [ -z "${MACOS_SIGN_P12:-}" ]; then
            echo "MACOS_SIGN_P12 unset — skipping chain check (darwin binaries ship unsigned)."
            exit 0
          fi
          echo "$MACOS_SIGN_P12" | base64 -d > /tmp/devid.p12
          subjects="$(openssl pkcs12 -in /tmp/devid.p12 -nokeys -legacy \
            -passin "pass:$MACOS_SIGN_PASSWORD" 2>/dev/null \
            | openssl crl2pkcs7 -nocrl -certfile /dev/stdin 2>/dev/null \
            | openssl pkcs7 -print_certs -noout 2>/dev/null \
            | grep '^subject' || true)"
          rm -f /tmp/devid.p12
          echo "Certificates in MACOS_SIGN_P12:"
          echo "$subjects"
          missing=0
          echo "$subjects" | grep -q "Developer ID Application" \
            || { echo "::error::MACOS_SIGN_P12 is missing the Developer ID Application leaf cert"; missing=1; }
          echo "$subjects" | grep -q "Developer ID Certification Authority" \
            || { echo "::error::MACOS_SIGN_P12 is missing the 'Developer ID Certification Authority' intermediate — AMFI will SIGKILL the binary (#204). Re-export the p12 with the full chain."; missing=1; }
          echo "$subjects" | grep -q "Apple Root CA" \
            || { echo "::error::MACOS_SIGN_P12 is missing the Apple Root CA — AMFI will SIGKILL the binary (#204). Re-export the p12 with the full chain."; missing=1; }
          [ "$missing" -eq 0 ] && echo "macOS signing chain OK: leaf + intermediate + root all present."
          exit "$missing"

      # ── Chocolatey publishing prerequisite ────────────────────────────────────
      # GoReleaser's `chocolateys` pipe shells out to the `choco` CLI to build the
      # .nupkg, which isn't present on the Linux runner. We install it (under mono)
      # ONLY when CHOCOLATEY_API_KEY is configured; otherwise we tell GoReleaser to
      # skip the chocolatey pipe so the release never fails for an unset secret
      # (mirrors the AZURE_SIGNING_ENABLED / MACOS_SIGN_P12 gating philosophy).
      - name: Set up Chocolatey CLI (only when key is configured)
        id: choco
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          # Pin the Chocolatey CLI version so the install source is deterministic
          # and a moving "latest" can't break the release. Bump deliberately.
          CHOCO_VERSION: "2.7.2"
        run: |
          # The chocolatey pipe is skipped UNLESS `choco` is PROVEN runnable. A
          # flaky third-party bootstrap must never fail the whole release (mirrors
          # the AZURE_SIGNING_ENABLED / MACOS_SIGN_P12 gating philosophy: a missing
          # prerequisite degrades, never blocks). skip_choco is written exactly
          # once, at the end, from the verified result.
          skip="chocolatey"

          if [ -z "$CHOCOLATEY_API_KEY" ]; then
            echo "CHOCOLATEY_API_KEY not set — skipping the chocolatey pipe."
          else
            echo "Installing Chocolatey CLI $CHOCO_VERSION (mono) for nupkg build + push…"
            sudo apt-get update -qq
            sudo apt-get install -y -qq mono-devel

            # The old community.chocolatey.org/install.sh bootstrap now 404s. Install
            # from the official, versioned GitHub release tarball instead — a stable
            # source that ships choco.exe (a .NET assembly runnable under mono). We
            # do NOT trust any single curl's exit code; the gate below is the source
            # of truth: is `choco` actually runnable?
            #
            # Install under a RUNNER-WRITABLE dir (not sudo-owned /opt): choco.exe
            # writes its own config/logs next to the assembly at runtime, so a
            # root-owned dir makes `choco --version` fail for the non-root runner
            # user (the silent failure that skipped the pipe before).
            CHOCO_DIR="$HOME/chocolatey"
            CHOCO_URL="https://github.com/chocolatey/choco/releases/download/${CHOCO_VERSION}/chocolatey.v${CHOCO_VERSION}.tar.gz"
            mkdir -p "$CHOCO_DIR"
            if curl -fsSL "$CHOCO_URL" -o /tmp/choco.tar.gz; then
              tar -xzf /tmp/choco.tar.gz -C "$CHOCO_DIR" || echo "choco extract failed; verifying next."
            else
              echo "choco tarball download failed; verifying next."
            fi

            # Provide a bare `choco` shim on PATH (GoReleaser shells out to `choco`,
            # not `mono choco.exe`), pointing at the extracted assembly under mono.
            # Build the wrapper with printf '%s\n' (NOT printf %q — dash/sh rejects
            # %q as an invalid directive and silently drops the path, which left the
            # shim running bare `mono`). The path has no spaces, so plain
            # interpolation into the wrapper body is safe; $@ is escaped so it
            # expands at shim-run time, not now.
            # CRITICAL: the `push` subcommand is made NON-FATAL. The Chocolatey
            # community feed can reject a push for reasons outside this release's
            # control (e.g. a moderated/new-maintainer account cannot push a new
            # version while a prior submission is still pending — a 403). GoReleaser
            # runs the chocolatey pipe LAST, but its non-zero exit aborts the whole
            # run (skipping the post-GoReleaser signing/cosign/mcpb/registry steps).
            # So a choco push failure must DEGRADE, not block — like the
            # AZURE_SIGNING_ENABLED gate. `choco push` runs, its real result is
            # surfaced as a ::warning::, but the shim exits 0. Every other subcommand
            # (pack, --version) passes its real exit code through.
            if [ -f "$CHOCO_DIR/choco.exe" ]; then
              printf '%s\n' \
                '#!/usr/bin/env bash' \
                "CHOCO_EXE=\"$CHOCO_DIR/choco.exe\"" \
                'if [ "$1" = "push" ]; then' \
                '  if mono "$CHOCO_EXE" "$@"; then' \
                '    echo "::notice::chocolatey push succeeded"' \
                '  else' \
                '    echo "::warning::chocolatey push failed (e.g. 403 from a pending-moderation account) — skipping this channel; the rest of the release is unaffected."' \
                '  fi' \
                '  exit 0' \
                'fi' \
                'exec mono "$CHOCO_EXE" "$@"' \
                | sudo tee /usr/local/bin/choco >/dev/null
              sudo chmod +x /usr/local/bin/choco
            fi

            # Verify choco actually runs — and SURFACE its output (don't swallow
            # stderr) so a future breakage is diagnosable instead of a silent skip.
            choco_ver_out="$(choco --version 2>&1)" && choco_ok=1 || choco_ok=0
            if [ "$choco_ok" = 1 ]; then
              echo "choco is available ($choco_ver_out) — enabling the chocolatey pipe."
              skip=""
            else
              echo "choco --version output: $choco_ver_out"
              echo "::warning::choco CLI unavailable after install — skipping the chocolatey pipe for this release (other channels unaffected)."
            fi
          fi

          echo "skip_choco=$skip" >> "$GITHUB_OUTPUT"

      # ── Registry auth + build infrastructure ─────────────────────────────────

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU (arm64 cross-compile)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft (SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      # ── GoReleaser — the core release step ────────────────────────────────────

      # When re-running via workflow_dispatch for an existing tag (e.g. to
      # complete a partial run that failed mid-way), GoReleaser errors with
      # "already_exists" on each asset. This step pre-deletes all existing
      # assets on the release so GoReleaser can re-upload cleanly.
      # Uses ${{ inputs.tag }} directly because GitHub Actions runner vars
      # (GITHUB_REF_NAME) cannot be overridden via $GITHUB_ENV.
      - name: Clear existing release assets (idempotent re-run)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          RELEASE_ID=$(gh api "repos/zoharbabin/web-researcher-mcp/releases/tags/${DISPATCH_TAG}" \
            --jq '.id // empty' 2>/dev/null || true)
          if [ -z "$RELEASE_ID" ]; then
            echo "No existing release found for ${DISPATCH_TAG} — nothing to clear."
            exit 0
          fi
          echo "Clearing assets for release ID ${RELEASE_ID} (${DISPATCH_TAG})..."
          gh api "repos/zoharbabin/web-researcher-mcp/releases/${RELEASE_ID}/assets" \
            --jq '.[].id' | while read -r asset_id; do
            gh api -X DELETE "repos/zoharbabin/web-researcher-mcp/releases/assets/${asset_id}" \
              && echo "  deleted asset ${asset_id}"
          done
          echo "Done clearing assets."

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean ${{ steps.choco.outputs.skip_choco && format('--skip={0}', steps.choco.outputs.skip_choco) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Windows package managers (gated in .goreleaser.yml via skip_upload —
          # an unset token makes the template emit "true", so GoReleaser builds the
          # manifest but skips the push, zero regression until the PAT is added).
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          WINGET_PKGS_GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_GITHUB_TOKEN }}
          # Chocolatey push API key (the chocolatey pipe is --skip'd above when unset).
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          # macOS Developer ID signing + notarization (see .goreleaser.yml
          # notarize.macos). The notarize block self-gates on MACOS_SIGN_P12
          # being set, so until these secrets exist GoReleaser skips signing and
          # ships unsigned darwin binaries exactly as before.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          # Windows Authenticode signing happens INSIDE GoReleaser via the
          # builds[].hooks.post wrapper (scripts/sign-windows.sh), so the signed
          # .exe is what gets archived + hashed + published to Scoop/WinGet/Cask —
          # no post-GoReleaser re-zip, no manifest hash drift. The wrapper no-ops
          # unless AZURE_SIGNING_ENABLED=true (same gate as before). Endpoint host
          # has NO trailing slash (jsign appends the API path); alias is
          # "<account>/<certificate-profile>".
          AZURE_SIGNING_ENABLED: ${{ vars.AZURE_SIGNING_ENABLED }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SIGN_ENDPOINT: https://eus.codesigning.azure.net
          AZURE_SIGN_ALIAS: web-researcher-signing/web-researcher-public

      # NOTE: Windows Authenticode signing now happens INSIDE GoReleaser, in the
      # builds[].hooks.post wrapper (scripts/sign-windows.sh), so the signed .exe
      # is the one GoReleaser archives, checksums, and publishes to Scoop/WinGet/
      # Cask — eliminating the old post-GoReleaser re-zip + checksum-rewrite step
      # and the manifest hash drift it caused.

      # ── Post-release artifact attachment ─────────────────────────────────────

      - name: Build .mcpb bundles
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          sudo apt-get install -y jq zip
          bash scripts/build-mcpb.sh "${RELEASE_TAG}"

      - name: Upload .mcpb bundles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          for f in dist/mcpb/*.mcpb; do
            gh release upload "${RELEASE_TAG}" "$f" --clobber
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-web-researcher-mcp.spdx.json
          output-file: sbom-web-researcher-mcp.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release upload "${RELEASE_TAG}" sbom-web-researcher-mcp.spdx.json --clobber

      - name: Sign checksums.txt with cosign (keyless OIDC)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          CHECKSUM_FILE="dist/checksums.txt"
          if [ ! -f "$CHECKSUM_FILE" ]; then
            echo "::error::dist/checksums.txt not found — GoReleaser may have failed"
            exit 1
          fi
          cosign sign-blob --yes "$CHECKSUM_FILE" \
            --output-signature "${CHECKSUM_FILE}.sig" \
            --output-certificate "${CHECKSUM_FILE}.pem"
          gh release upload "${RELEASE_TAG}" \
            "${CHECKSUM_FILE}.sig" "${CHECKSUM_FILE}.pem" --clobber

      # Persist the cross-compiled (and signed/notarized) binaries so the
      # downstream publish-pypi job can wrap them into wheels WITHOUT re-running
      # GoReleaser. Positioned last and continue-on-error so a missing-glob (e.g. a
      # future GOAMD64 dist-dir rename) can never abort the core release's
      # cosign/SBOM/.mcpb steps — the wheels just don't publish that run.
      # if-no-files-found: warn matches the continue-on-error intent (degrade,
      # don't fail — the file list is GoReleaser's output, not ours).
      - name: Upload dist binaries artifact (for PyPI wheel build)
        if: ${{ vars.PYPI_PUBLISH_ENABLED == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: dist-binaries
          retention-days: 1
          if-no-files-found: warn
          path: |
            dist/web-researcher-mcp_*/web-researcher-mcp
            dist/web-researcher-mcp_*/web-researcher-mcp.exe

  # ── 🐳 Docker image signing ───────────────────────────────────────────────────
  # Fetches the image digest from GHCR and signs it with cosign using GitHub's
  # OIDC identity, creating a publicly verifiable Sigstore signature.
  docker-sign:
    name: 🐳 Sign Docker Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Set release tag
        run: echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign GHCR image
        run: |
          IMAGE="ghcr.io/zoharbabin/web-researcher-mcp:${RELEASE_TAG#v}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest}}' | jq -r '.digest')
          cosign sign --yes "ghcr.io/zoharbabin/web-researcher-mcp@${DIGEST}"

  # ── 📋 MCP Registry ───────────────────────────────────────────────────────────
  # Re-syncs the version string and publishes to the MCP Registry via
  # mcp-publisher + GitHub OIDC authentication. Depends on `release` (not
  # `docker-sign`) — the registry needs the GitHub Release to exist, not the
  # Docker signature, so there's no reason to wait for the signing job.
  publish-mcp-registry:
    name: 📋 Publish → MCP Registry
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Set release tag
        run: echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7

      - name: Sync version for publish
        run: |
          echo "${RELEASE_TAG#v}" > VERSION
          bash scripts/sync-version.sh

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz
          chmod +x mcp-publisher

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher publish \
            || echo "::warning::MCP Registry publish failed — check registry manually (may already exist or OIDC expired)"

  # ── 🔨 Smithery ───────────────────────────────────────────────────────────────
  # Publishes the .mcpb bundle to Smithery. Downloads the bundle that was already
  # built and uploaded by the `release` job — no need to rebuild from source.
  # Gated on SMITHERY_ENABLED so an unconfigured fork is a clean no-op.
  publish-smithery:
    name: 🔨 Publish → Smithery
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.SMITHERY_ENABLED == 'true' }}
    steps:
      - name: Set release tag
        run: echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Smithery CLI
        run: npm install -g @smithery/cli

      - name: Download .mcpb bundle from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p dist/mcpb
          gh release download "${RELEASE_TAG}" \
            --pattern "web-researcher-mcp_${VERSION}_linux_amd64.mcpb" \
            --dir dist/mcpb

      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          mkdir -p "$HOME/.config/smithery"
          echo "{\"apiKey\":\"${SMITHERY_API_KEY}\"}" > "$HOME/.config/smithery/settings.json"
          smithery mcp publish "dist/mcpb/web-researcher-mcp_${VERSION}_linux_amd64.mcpb" \
            -n web-researcher-mcp/web-researcher-mcp \
            || echo "::warning::Smithery publish failed (may already exist or API key expired)"

  # ── 🐍 PyPI platform wheels ───────────────────────────────────────────────────
  # Wraps the cross-compiled binaries (built by the `release` job) into platform
  # wheels for uvx/uv/pip. Publishes via Trusted Publishing (OIDC — no token
  # secret). skip-existing tolerates partial-failure re-runs.
  # Gated on PYPI_PUBLISH_ENABLED so an unconfigured fork is a clean no-op.
  publish-pypi:
    name: 🐍 Publish → PyPI
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.PYPI_PUBLISH_ENABLED == 'true' }}
    environment: pypi
    permissions:
      id-token: write   # mandatory for PyPI Trusted Publishing; job-scoped
    steps:
      - name: Set release tag
        run: echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download dist binaries from release job
        uses: actions/download-artifact@v8
        with:
          name: dist-binaries
          path: dist

      - name: Build platform wheels
        run: python3 scripts/build_wheels.py "${RELEASE_TAG#v}" --dist dist --out dist/wheels

      - name: Smoke-test manylinux wheel (import check)
        run: |
          # Install the linux/amd64 (manylinux) wheel and verify the package is
          # importable with its full public API surface — catches wheel assembly
          # bugs (missing files, broken __init__) before they land on PyPI.
          whl=$(ls dist/wheels/web_researcher_mcp-*-manylinux_2_17_x86_64.whl 2>/dev/null | head -1)
          if [ -z "$whl" ]; then
            echo "::warning::manylinux wheel not found — skipping smoke test"
            exit 0
          fi
          pip install --quiet "$whl"
          python3 -c "
          import web_researcher_mcp as pkg
          assert hasattr(pkg, 'WebResearcherClient'), 'WebResearcherClient missing'
          assert hasattr(pkg, 'SyncWebResearcherClient'), 'SyncWebResearcherClient missing'
          assert hasattr(pkg, '__version__'), '__version__ missing'
          print('wheel smoke: OK —', pkg.__version__)
          "

      - name: Publish wheels to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/wheels
          skip-existing: true

  # ── 📦 AUR + Nix packaging manifests ─────────────────────────────────────────
  # Runs after `release` so checksums.txt is available on the GitHub Release.
  #
  # What it does:
  #   1. Generates PKGBUILD/.SRCINFO/flake.nix with correct version + hashes
  #   2. Attaches them as release artifacts (source of truth, no repo commit needed)
  #   3. Pushes directly to AUR via SSH (gated on AUR_SSH_KEY secret)
  #
  # No PR to this repo — the generated files never need to live in main.
  # Checksums only exist after GoReleaser runs, so this must run post-release.
  #
  # Gated on PACKAGING_UPDATE_ENABLED so an unconfigured fork is a clean no-op.
  update-packaging:
    name: 📦 Update Packaging Manifests
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.PACKAGING_UPDATE_ENABLED == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Set release tag
        run: echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install helpers (xxd, python3)
        run: sudo apt-get install -y xxd python3

      - name: Generate packaging manifests
        run: |
          VERSION="${RELEASE_TAG#v}"
          bash scripts/update-packaging.sh "$VERSION"
          echo "Generated manifests for v${VERSION}"

      - name: Attach manifests to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Upload the three generated files as release assets.
          # These are the canonical versioned manifests — AUR/Nix consumers
          # download them directly from the release page.
          gh release upload "v${VERSION}" \
            packaging/aur/PKGBUILD \
            packaging/aur/.SRCINFO \
            packaging/nix/flake.nix \
            packaging/nixpkgs/package.nix \
            --clobber
          echo "Attached PKGBUILD, .SRCINFO, flake.nix, package.nix to v${VERSION} release"

      - name: Push to AUR
        if: env.AUR_SSH_KEY != ''
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"

          # Write the SSH key
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          # Clone the AUR package repo
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=yes" \
            git clone ssh://aur@aur.archlinux.org/web-researcher-mcp.git /tmp/aur-pkg

          # Drop in the generated files
          cp packaging/aur/PKGBUILD  /tmp/aur-pkg/PKGBUILD
          cp packaging/aur/.SRCINFO  /tmp/aur-pkg/.SRCINFO

          # Commit and push
          git -C /tmp/aur-pkg config user.name  "web-researcher-mcp-bot"
          git -C /tmp/aur-pkg config user.email "github-actions@users.noreply.github.com"
          git -C /tmp/aur-pkg add PKGBUILD .SRCINFO
          git -C /tmp/aur-pkg diff --cached --quiet && \
            echo "AUR already up-to-date for v${VERSION}" && exit 0
          git -C /tmp/aur-pkg commit -m "Update to v${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_key -o StrictHostKeyChecking=yes" \
            git -C /tmp/aur-pkg push
          echo "Pushed v${VERSION} to AUR"

          # Scrub key from disk
          rm -f ~/.ssh/aur_key

  # ── 🐧 nixpkgs proper ─────────────────────────────────────────────────────────
  # Submits (or updates) a PR to NixOS/nixpkgs with a buildGoModule derivation.
  #
  # Two modes, chosen automatically:
  #   • Package not yet in nixpkgs → opens the initial PR (one-time, human-reviewed)
  #   • Package already merged      → no-op; nixpkgs-update bot handles future bumps
  #     automatically by running `passthru.updateScript = nix-update-script {}`.
  #
  # Hash computation workflow:
  #   1. Install nix (DeterminateSystems/nix-installer — fast, cached on ubuntu)
  #   2. Run `nix build` with lib.fakeHash to capture real src hash from error
  #   3. Re-run with real src hash to capture real vendorHash
  #   4. Write both into packaging/nixpkgs/package.nix
  #   5. Fork NixOS/nixpkgs, push branch, open PR
  #
  # Gated on NIXPKGS_ENABLED var + NIXPKGS_FORK_GITHUB_TOKEN secret.
  # An unconfigured fork is a clean no-op (same degradation model as all other
  # optional channels: Smithery, Chocolatey, AUR).
  submit-nixpkgs-pr:
    name: 🐧 Submit → nixpkgs proper
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.NIXPKGS_ENABLED == 'true' }}
    steps:
      - name: Set release tag
        run: echo "RELEASE_TAG=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      # ── Check if package already exists in NixOS/nixpkgs ─────────────────────
      # If it does, nixpkgs-update bot handles bumps — this job is done.
      - name: Check if package already in nixpkgs
        id: nixpkgs_check
        env:
          GH_TOKEN: ${{ secrets.NIXPKGS_FORK_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKG_PATH="pkgs/by-name/we/web-researcher-mcp/package.nix"
          STATUS=$(gh api "repos/NixOS/nixpkgs/contents/${PKG_PATH}" \
            --jq '.name' 2>/dev/null || echo "NOT_FOUND")
          if [ "$STATUS" = "package.nix" ]; then
            echo "already_in_nixpkgs=true" >> "$GITHUB_OUTPUT"
            echo "Package is already in NixOS/nixpkgs — nixpkgs-update bot handles future bumps."
          else
            echo "already_in_nixpkgs=false" >> "$GITHUB_OUTPUT"
            echo "Package not yet in nixpkgs — will open initial PR."
          fi

      # ── Install nix (only needed for hash computation) ────────────────────────
      - name: Install nix
        if: steps.nixpkgs_check.outputs.already_in_nixpkgs != 'true'
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      # ── Compute src hash ──────────────────────────────────────────────────────
      # Strategy: build fetchFromGitHub with an empty hash → nix errors with the
      # real hash in the message → parse it out. Deterministic and cache-friendly.
      - name: Compute src hash
        if: steps.nixpkgs_check.outputs.already_in_nixpkgs != 'true'
        id: src_hash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          # Write a minimal nix expression that fetches the source with a fake hash.
          cat > /tmp/fetch-src.nix <<NIX
          let pkgs = import (builtins.fetchTarball "channel:nixpkgs-unstable") {};
          in pkgs.fetchFromGitHub {
            owner = "zoharbabin";
            repo = "web-researcher-mcp";
            tag = "v${VERSION}";
            hash = "\${pkgs.lib.fakeHash}";
          }
          NIX
          # Capture the error — it contains the real hash.
          HASH_OUT="$(nix-build /tmp/fetch-src.nix --no-out-link 2>&1 || true)"
          REAL_HASH="$(echo "${HASH_OUT}" | grep -oE 'sha256-[A-Za-z0-9+/=]+' | tail -1)"
          if [ -z "${REAL_HASH}" ]; then
            echo "::error::Failed to extract src hash from nix output. Output:"
            echo "${HASH_OUT}"
            exit 1
          fi
          echo "src_hash=${REAL_HASH}" >> "$GITHUB_OUTPUT"
          echo "Computed src hash: ${REAL_HASH}"

      # ── Compute vendorHash ────────────────────────────────────────────────────
      - name: Compute vendorHash
        if: steps.nixpkgs_check.outputs.already_in_nixpkgs != 'true'
        id: vendor_hash
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          SRC_HASH: ${{ steps.src_hash.outputs.src_hash }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          cat > /tmp/vendor-hash.nix <<NIX
          let pkgs = import (builtins.fetchTarball "channel:nixpkgs-unstable") {};
          in pkgs.buildGoModule {
            pname = "web-researcher-mcp";
            version = "${VERSION}";
            src = pkgs.fetchFromGitHub {
              owner = "zoharbabin";
              repo = "web-researcher-mcp";
              tag = "v${VERSION}";
              hash = "${SRC_HASH}";
            };
            env.CGO_ENABLED = 0;
            vendorHash = "\${pkgs.lib.fakeHash}";
          }
          NIX
          HASH_OUT="$(nix-build /tmp/vendor-hash.nix --no-out-link 2>&1 || true)"
          REAL_HASH="$(echo "${HASH_OUT}" | grep -oE 'sha256-[A-Za-z0-9+/=]+' | tail -1)"
          if [ -z "${REAL_HASH}" ]; then
            echo "::error::Failed to extract vendorHash from nix output. Output:"
            echo "${HASH_OUT}"
            exit 1
          fi
          echo "vendor_hash=${REAL_HASH}" >> "$GITHUB_OUTPUT"
          echo "Computed vendorHash: ${REAL_HASH}"

      # ── Update package.nix with real hashes ───────────────────────────────────
      - name: Patch package.nix with computed hashes
        if: steps.nixpkgs_check.outputs.already_in_nixpkgs != 'true'
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          SRC_HASH: ${{ steps.src_hash.outputs.src_hash }}
          VENDOR_HASH: ${{ steps.vendor_hash.outputs.vendor_hash }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          NIX_PKG="packaging/nixpkgs/package.nix"

          # Update version
          perl -i -pe "s/version = \"[^\"]+\"/version = \"${VERSION}\"/" "${NIX_PKG}"

          # Update src hash (the one inside fetchFromGitHub block)
          perl -i -pe "s|hash = \"sha256-[A-Za-z0-9+/=]+\";|hash = \"${SRC_HASH}\";|" "${NIX_PKG}"

          # Update vendorHash
          perl -i -pe "s|vendorHash = \"sha256-[A-Za-z0-9+/=]+\";|vendorHash = \"${VENDOR_HASH}\";|" "${NIX_PKG}"

          echo "package.nix after patching:"
          grep -E 'version|hash|vendorHash' "${NIX_PKG}"

      # ── Fork, branch, PR ─────────────────────────────────────────────────────
      - name: Fork NixOS/nixpkgs (idempotent)
        if: steps.nixpkgs_check.outputs.already_in_nixpkgs != 'true'
        env:
          GH_TOKEN: ${{ secrets.NIXPKGS_FORK_GITHUB_TOKEN }}
        run: |
          # Fork is idempotent — safe to call even if fork already exists.
          gh repo fork NixOS/nixpkgs --clone=false 2>/dev/null || true
          # Give GitHub a moment to finish the fork operation before we clone.
          sleep 10

      - name: Clone fork, create branch, push
        if: steps.nixpkgs_check.outputs.already_in_nixpkgs != 'true'
        env:
          GH_TOKEN: ${{ secrets.NIXPKGS_FORK_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          GH_USER="$(gh api user --jq '.login')"
          BRANCH="nixpkgs-web-researcher-mcp-${VERSION}"
          PKG_DIR="pkgs/by-name/we/web-researcher-mcp"
          FORK_REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GH_USER}/nixpkgs.git"

          echo "Cloning fork (depth=1)..."
          git clone --depth=1 --branch master "${FORK_REMOTE}" /tmp/nixpkgs
          git -C /tmp/nixpkgs checkout -b "${BRANCH}"

          mkdir -p "/tmp/nixpkgs/${PKG_DIR}"
          cp packaging/nixpkgs/package.nix "/tmp/nixpkgs/${PKG_DIR}/package.nix"

          git -C /tmp/nixpkgs config user.name  "web-researcher-mcp-bot"
          git -C /tmp/nixpkgs config user.email "github-actions@users.noreply.github.com"

          # Add zoharbabin to maintainers/maintainer-list.nix if not already present.
          # Entries are alphabetical; "zoharbabin" < "zohl" (4th char 'a' < 'l'),
          # so it sorts immediately before zohl, not before zookatron.
          MLIST="/tmp/nixpkgs/maintainers/maintainer-list.nix"
          if ! grep -q 'zoharbabin' "${MLIST}"; then
            perl -i -0pe 's|(  zohl = \{)|  zoharbabin = \{\n    email = "zohar\@zoharbabin.com";\n    github = "zoharbabin";\n    githubId = 150514;\n    name = "Zohar Babin";\n  };\n$1|' "${MLIST}"
            git -C /tmp/nixpkgs add maintainers/maintainer-list.nix
          fi

          git -C /tmp/nixpkgs add "${PKG_DIR}/package.nix"
          git -C /tmp/nixpkgs commit -m "web-researcher-mcp: init at ${VERSION}"

          # Plain --force, not --force-with-lease: this is a shallow, fresh clone
          # that never fetched ${BRANCH}, so there's no local tracking ref to lease
          # against — git treats the branch as "expected absent" and rejects the
          # push as stale on any re-run once the branch already exists on the fork.
          # The bot fully owns this branch and always intends to overwrite it.
          git -C /tmp/nixpkgs push "${FORK_REMOTE}" "${BRANCH}" --force
          echo "fork_user=${GH_USER}" >> "$GITHUB_ENV"
          echo "pr_branch=${BRANCH}" >> "$GITHUB_ENV"
          echo "pkg_version=${VERSION}" >> "$GITHUB_ENV"

      - name: Open PR against NixOS/nixpkgs
        if: steps.nixpkgs_check.outputs.already_in_nixpkgs != 'true'
        env:
          GH_TOKEN: ${{ secrets.NIXPKGS_FORK_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat > /tmp/nixpkgs-pr-body.md << 'PREOF'
          ## Description

          Adds `web-researcher-mcp` to nixpkgs. This is a Model Context Protocol (MCP)
          server that gives AI assistants web search, content extraction, and multi-source
          research with verifiable citations.

          - Homepage: https://github.com/zoharbabin/web-researcher-mcp
          - License: MIT
          - Language: Go (pure Go, `CGO_ENABLED=0`, no C deps)
          - Binary name: `web-researcher-mcp`

          ## Verification

          - `nix build` succeeds on x86_64-linux and aarch64-darwin
          - `web-researcher-mcp --help` exits 0
          - Lens JSON files installed to `$out/share/web-researcher-mcp/lenses/`
          - `passthru.updateScript = nix-update-script {}` wired for automated future bumps

          ## Checklist

          - [x] `nix build` succeeds
          - [x] Tests pass (browser/network tests skipped — require display + network)
          - [x] `passthru.updateScript` set for automated future version bumps
          - [x] `meta.mainProgram` set
          - [x] `meta.changelog` set
          - [x] Uses `buildGoModule` per nixpkgs packaging guidelines
          - [x] Placed in `pkgs/by-name/we/web-researcher-mcp/package.nix` per by-name convention
          - [x] `zoharbabin` added to `maintainers/maintainer-list.nix`
          PREOF
          PR_URL="$(gh pr create \
            --repo NixOS/nixpkgs \
            --head "${fork_user}:${pr_branch}" \
            --base master \
            --title "web-researcher-mcp: init at ${pkg_version}" \
            --body-file /tmp/nixpkgs-pr-body.md || true)"
          if [ -n "${PR_URL}" ]; then
            echo "PR created: ${PR_URL}"
            echo "::notice::nixpkgs PR opened: ${PR_URL}"
          else
            echo "::warning::PR creation returned empty URL — check for existing open PR or auth issue"
          fi
