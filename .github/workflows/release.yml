name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Sign Windows binary (SignPath)
        if: ${{ vars.SIGNPATH_ENABLED == 'true' }}
        id: sign-windows
        run: |
          # Find the Windows exe built by GoReleaser
          WIN_EXE=$(find dist -name "web-researcher-mcp.exe" -path "*windows*" | head -1)
          if [ -z "$WIN_EXE" ]; then
            echo "::warning::Windows exe not found in dist/, skipping signing"
            exit 0
          fi
          echo "exe_path=$WIN_EXE" >> "$GITHUB_OUTPUT"
          mkdir -p unsigned-artifact
          cp "$WIN_EXE" unsigned-artifact/web-researcher-mcp.exe

      - name: Upload unsigned Windows binary
        if: ${{ vars.SIGNPATH_ENABLED == 'true' && steps.sign-windows.outputs.exe_path != '' }}
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: web-researcher-mcp-unsigned
          path: unsigned-artifact/web-researcher-mcp.exe

      - name: Submit SignPath signing request
        if: ${{ vars.SIGNPATH_ENABLED == 'true' && steps.sign-windows.outputs.exe_path != '' }}
        id: signpath-sign
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: Web-Researcher-MCP
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed-artifact
          wait-for-completion-timeout-in-seconds: 300

      - name: Replace unsigned exe in release zip
        if: ${{ vars.SIGNPATH_ENABLED == 'true' && steps.sign-windows.outputs.exe_path != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="web-researcher-mcp_${VERSION}_windows_amd64.zip"
          ZIP_PATH="dist/$ZIP_NAME"

          if [ -f "signed-artifact/web-researcher-mcp.exe" ] && [ -f "$ZIP_PATH" ]; then
            # Replace the exe inside the zip
            cd signed-artifact
            zip -j "../$ZIP_PATH" web-researcher-mcp.exe
            cd ..

            # Re-upload the zip to the release
            gh release upload "${{ github.ref_name }}" "$ZIP_PATH" --clobber

            # Update checksums
            sha256sum "$ZIP_PATH" | sed "s|dist/||" > /tmp/new_checksum.txt
            if [ -f dist/checksums.txt ]; then
              grep -v "$ZIP_NAME" dist/checksums.txt > /tmp/remaining.txt || true
              cat /tmp/remaining.txt /tmp/new_checksum.txt > dist/checksums.txt
              gh release upload "${{ github.ref_name }}" dist/checksums.txt --clobber
            fi
            echo "::notice::Windows binary signed and release updated"
          else
            echo "::warning::Signed artifact not found, release contains unsigned binary"
          fi

      - name: Build .mcpb bundles
        run: |
          sudo apt-get install -y jq zip
          bash scripts/build-mcpb.sh "${{ github.ref_name }}"

      - name: Upload .mcpb bundles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in dist/mcpb/*.mcpb; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-web-researcher-mcp.spdx.json
          output-file: sbom-web-researcher-mcp.spdx.json

      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} sbom-web-researcher-mcp.spdx.json --clobber

      - name: Sign release artifacts with cosign
        run: |
          for asset in dist/checksums.txt; do
            if [ -f "$asset" ]; then
              cosign sign-blob --yes "$asset" --output-signature "${asset}.sig" --output-certificate "${asset}.pem"
              gh release upload ${{ github.ref_name }} "${asset}.sig" "${asset}.pem" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-sign:
    name: Sign Docker Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign GHCR image
        run: |
          IMAGE="ghcr.io/zoharbabin/web-researcher-mcp:${GITHUB_REF_NAME#v}"
          DIGEST=$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest}}' | jq -r '.digest')
          cosign sign --yes "ghcr.io/zoharbabin/web-researcher-mcp@${DIGEST}"

  publish-mcp-registry:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    needs: docker-sign
    steps:
      - uses: actions/checkout@v6

      - name: Sync version references for publish
        run: |
          echo "${GITHUB_REF_NAME#v}" > VERSION
          bash scripts/sync-version.sh

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz
          chmod +x mcp-publisher

      - name: Authenticate via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish || echo "MCP Registry publish failed (may already exist)"

  publish-smithery:
    name: Publish to Smithery
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.SMITHERY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Smithery CLI
        run: npm install -g @smithery/cli

      - name: Build .mcpb bundle
        run: |
          sudo apt-get install -y jq zip
          bash scripts/build-mcpb.sh "${GITHUB_REF_NAME}"

      - name: Publish to Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p "$HOME/.config/smithery"
          echo "{\"apiKey\":\"${SMITHERY_API_KEY}\"}" > "$HOME/.config/smithery/settings.json"
          smithery mcp publish "dist/mcpb/web-researcher-mcp_${VERSION}_linux_amd64.mcpb" \
            -n web-researcher-mcp/web-researcher-mcp || echo "Smithery publish failed (non-fatal)"

