site_name: Web Researcher MCP
site_url: https://zoharbabin.github.io/web-researcher-mcp/
site_description: AI research without the made-up sources — you choose which sites your AI searches, every citation is real
repo_url: https://github.com/zoharbabin/web-researcher-mcp
repo_name: zoharbabin/web-researcher-mcp

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zoharbabin/web-researcher-mcp

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

docs_dir: site_src

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Tools: tools.md
  - Examples: examples.md
  - API Setup: api-setup.md
  - Deployment: deployment.md
  - Security: security.md
  - Contributing: contributing.md
  - Lessons Learned: lessons-learned.md
  - Migration: migration.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
