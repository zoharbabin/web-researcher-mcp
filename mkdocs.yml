site_name: Web Researcher MCP
site_url: https://zoharbabin.com/web-researcher-mcp/
site_description: Your AI research assistant that cites real sources and stays honest. Search the entire web or narrow it down to just the sites you trust.
repo_url: https://github.com/zoharbabin/web-researcher-mcp
repo_name: zoharbabin/web-researcher-mcp

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zoharbabin/web-researcher-mcp
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/zohar
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/zoharbabin/web-researcher-mcp

theme:
  name: material
  custom_dir: overrides
  font: false
  icon:
    repo: fontawesome/brands/github
  logo: img/logo.svg
  favicon: img/favicon.ico
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

docs_dir: site_src

nav:
  - Home: index.md
  - Examples: examples.md
  - Tools: tools.md
  - API Setup: api-setup.md
  - Providers: providers.md
  - Deployment: deployment.md
  - Security: security.md
  - Security & Compliance: security-and-compliance.md
  - Architecture: architecture.md
  - Contributing: contributing.md
  - Error Handling: error-handling.md
  - Privacy Policy: privacy.md
  - Brand Guidelines: brand-guidelines.md
  - Our Story: lessons-learned.md
  - Session Persistence: session-persistence.md
  - Migration: migration.md
  - CI/CD Guide: cicd.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
