[tool.pytest.ini_options]
# Discover tests under tests/python/; add python/ to sys.path so the package
# is importable without an install when running from the repo root.
testpaths = ["tests/python"]
pythonpath = ["python"]

[tool.mypy]
# Source tree is PEP 561-typed (py.typed marker present).
# Type-check only the hand-authored Python sources; skip generated files.
files = [
    "python/web_researcher_mcp/_server.py",
    "scripts/build_wheels.py",
    "scripts/gen_python_client.py",
]
python_version = "3.10"
strict = false
ignore_missing_imports = true
