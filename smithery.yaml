description: "Your AI research assistant that cites real sources and stays honest — web search, deep content extraction, academic + patent + legal + economic research, and a trust suite that catches fabricated, retracted, or mischaracterized citations before they ship. Zero-config with DuckDuckGo; connect Google, Brave, Tavily, or Exa for richer results."

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      google_api_key:
        type: string
        description: "Google Custom Search API key"
      google_cx:
        type: string
        description: "Google Custom Search engine ID"
      search_provider:
        type: string
        description: "Search provider (google, brave, serper, searxng, searchapi, duckduckgo, tavily, exa, hackernews)"
        default: "google"
      search_routing:
        type: string
        description: "Multi-provider routing with automatic fallback (e.g. brave,google,serper)"
      brave_api_key:
        type: string
        description: "Brave Search API key (required if using brave provider)"
      serper_api_key:
        type: string
        description: "Serper.dev API key (required if using serper provider)"
      searchapi_api_key:
        type: string
        description: "SearchAPI.io API key (required if using searchapi provider)"
      searxng_url:
        type: string
        description: "SearXNG instance URL (required if using searxng provider)"
      tavily_api_key:
        type: string
        description: "Tavily Search API key (required if using tavily provider)"
      exa_api_key:
        type: string
        description: "Exa API key (required if using exa provider; also enables answer and structured_search)"
      edgar_contact_email:
        type: string
        description: "Contact email for SEC EDGAR (enables filing_search); falls back to OPENALEX_EMAIL"
      courtlistener_api_token:
        type: string
        description: "CourtListener API token (legal_search works keyless; a token raises the rate limit)"
      fred_api_key:
        type: string
        description: "FRED API key (enables econ_search for Federal Reserve economic data)"
    required: []
  commandFunction:
    - web-researcher-mcp
  env:
    GOOGLE_CUSTOM_SEARCH_API_KEY: "{{config.google_api_key}}"
    GOOGLE_CUSTOM_SEARCH_ID: "{{config.google_cx}}"
    SEARCH_PROVIDER: "{{config.search_provider}}"
    SEARCH_ROUTING: "{{config.search_routing}}"
    BRAVE_API_KEY: "{{config.brave_api_key}}"
    SERPER_API_KEY: "{{config.serper_api_key}}"
    SEARCHAPI_API_KEY: "{{config.searchapi_api_key}}"
    SEARXNG_URL: "{{config.searxng_url}}"
    TAVILY_API_KEY: "{{config.tavily_api_key}}"
    EXA_API_KEY: "{{config.exa_api_key}}"
    EDGAR_CONTACT_EMAIL: "{{config.edgar_contact_email}}"
    COURTLISTENER_API_TOKEN: "{{config.courtlistener_api_token}}"
    FRED_API_KEY: "{{config.fred_api_key}}"
