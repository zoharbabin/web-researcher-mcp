startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      google_api_key:
        type: string
        description: "Google Custom Search API key"
      google_cx:
        type: string
        description: "Google Custom Search engine ID"
      search_provider:
        type: string
        description: "Search provider (google, brave, serper, searxng)"
        default: "google"
      brave_api_key:
        type: string
        description: "Brave Search API key (required if search_provider=brave)"
    required:
      - google_api_key
      - google_cx
  commandFunction:
    - web-researcher-mcp
  env:
    GOOGLE_CUSTOM_SEARCH_API_KEY: "{{config.google_api_key}}"
    GOOGLE_CUSTOM_SEARCH_ID: "{{config.google_cx}}"
    SEARCH_PROVIDER: "{{config.search_provider}}"
    BRAVE_API_KEY: "{{config.brave_api_key}}"
